<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>生日快樂，邱平諺！</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: "Georgia", "Noto Serif TC", serif;
    background: linear-gradient(180deg, #ffe4ec 0%, #fff0f5 50%, #fde2e4 100%);
    overflow: hidden;
    color: #5a2a3a;
  }

  .balloons {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .balloon {
    position: absolute;
    bottom: -160px;
    width: 46px;
    height: 58px;
    border-radius: 50%;
    opacity: 0.75;
    animation: floatUp linear infinite;
    filter: drop-shadow(0 4px 6px rgba(255, 180, 200, 0.4));
  }
  .balloon::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    width: 1px;
    height: 70px;
    background: rgba(200, 120, 140, 0.35);
  }
  .balloon::before {
    content: "";
    position: absolute;
    top: 10px;
    left: 10px;
    width: 10px;
    height: 14px;
    background: rgba(255, 255, 255, 0.55);
    border-radius: 50%;
    filter: blur(1px);
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); }
    50%  { transform: translateY(-55vh) translateX(20px) rotate(4deg); }
    100% { transform: translateY(-115vh) translateX(-10px) rotate(-3deg); }
  }

  #fireworks {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }

  .card {
    position: relative;
    z-index: 3;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
  }

  .title {
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 700;
    color: #d6336c;
    text-shadow: 0 2px 6px rgba(214, 51, 108, 0.15);
    letter-spacing: 2px;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeIn 1.8s ease-out 0.3s forwards;
  }

  .subtitle {
    font-size: clamp(0.95rem, 1.8vw, 1.2rem);
    color: #8a4a5e;
    margin-top: 24px;
    max-width: 640px;
    line-height: 2;
    opacity: 0;
    animation: fadeIn 1.8s ease-out 1.8s forwards;
  }

  .subtitle .line {
    display: block;
    margin-bottom: 2px;
  }

  .subtitle .line.highlight {
    font-size: 1.05em;
    color: #d6336c;
    font-weight: 600;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cake-wrap {
    position: relative;
    cursor: pointer;
    opacity: 0;
    animation: fadeIn 1.8s ease-out 1s forwards;
    transition: transform 0.25s ease;
  }
  .cake-wrap:hover { transform: scale(1.04); }
  .cake-wrap:active { transform: scale(0.98); }

  .cake {
    position: relative;
    width: 220px;
    height: 200px;
  }

  .plate {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    height: 18px;
    background: linear-gradient(180deg, #fff 0%, #e8c5d0 100%);
    border-radius: 50%;
    box-shadow: 0 6px 10px rgba(180, 80, 110, 0.2);
  }

  .layer-bottom {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 70px;
    background: linear-gradient(180deg, #ffb3c6 0%, #ff8fa3 100%);
    border-radius: 12px 12px 6px 6px;
    box-shadow: inset 0 -8px 0 rgba(0,0,0,0.08);
  }
  .cream-bottom {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 14px;
    background: #fff5f7;
    border-radius: 4px;
  }
  .cream-bottom::before,
  .cream-bottom::after {
    content: "";
    position: absolute;
    top: 100%;
    width: 20px;
    height: 10px;
    background: #fff5f7;
    border-radius: 0 0 50% 50%;
  }
  .cream-bottom::before { left: 15%; }
  .cream-bottom::after  { left: 65%; }

  .layer-top {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 55px;
    background: linear-gradient(180deg, #ffc2d1 0%, #ff9ab0 100%);
    border-radius: 10px 10px 5px 5px;
    box-shadow: inset 0 -6px 0 rgba(0,0,0,0.08);
  }
  .cream-top {
    position: absolute;
    bottom: 142px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 12px;
    background: #fff5f7;
    border-radius: 4px;
  }
  .cream-top::before,
  .cream-top::after {
    content: "";
    position: absolute;
    top: 100%;
    width: 16px;
    height: 8px;
    background: #fff5f7;
    border-radius: 0 0 50% 50%;
  }
  .cream-top::before { left: 20%; }
  .cream-top::after  { left: 60%; }

  .candle {
    position: absolute;
    bottom: 152px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 28px;
    background: repeating-linear-gradient(
      180deg,
      #fff 0 4px,
      #ffb6c1 4px 8px
    );
    border-radius: 2px;
  }
  .flame {
    position: absolute;
    bottom: 180px;
    left: 50%;
    transform: translateX(-50%);
    width: 10px;
    height: 16px;
    background: radial-gradient(ellipse at 50% 70%, #fff59d 0%, #ffb74d 60%, #ff7043 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    animation: flicker 0.6s ease-in-out infinite alternate;
    box-shadow: 0 0 12px rgba(255, 167, 38, 0.6);
  }
  @keyframes flicker {
    0%   { transform: translateX(-50%) scale(1) rotate(-2deg); opacity: 0.9; }
    100% { transform: translateX(-50%) scale(1.1) rotate(2deg); opacity: 1; }
  }

  .sprinkle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .s1 { bottom: 110px; left: 30%; background: #fff; }
  .s2 { bottom: 120px; left: 55%; background: #c94f74; }
  .s3 { bottom: 105px; left: 70%; background: #fff; }
  .s4 { bottom: 40px; left: 25%; background: #fff; }
  .s5 { bottom: 50px; left: 60%; background: #c94f74; }
  .s6 { bottom: 35px; left: 75%; background: #fff; }

  .hint {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.85rem;
    color: #b06680;
    opacity: 0;
    animation: fadeIn 2s ease-out 2.8s forwards;
    z-index: 3;
  }
</style>
</head>
<body>

<div class="balloons" id="balloons"></div>
<canvas id="fireworks"></canvas>

<div class="card">
  <h1 class="title">🎂 生日快樂，平諺！Happy Birthday! 🎉</h1>

  <div class="cake-wrap" id="cakeWrap" title="點我！">
    <div class="cake">
      <div class="flame"></div>
      <div class="candle"></div>
      <div class="cream-top"></div>
      <div class="layer-top"></div>
      <div class="cream-bottom"></div>
      <div class="layer-bottom"></div>
      <div class="plate"></div>
      <div class="sprinkle s1"></div>
      <div class="sprinkle s2"></div>
      <div class="sprinkle s3"></div>
      <div class="sprinkle s4"></div>
      <div class="sprinkle s5"></div>
      <div class="sprinkle s6"></div>
    </div>
  </div>

  <p class="subtitle">
    <span class="line highlight">🎓 恭喜完成碩士學業，展翅高飛！</span>
    <span class="line">願你生日這天笑聲滿滿，從此每一步都走得踏實而精彩。</span>
    <span class="line">工作順遂，生活自在，身體健康無煩惱。</span>
    <span class="line highlight">✈️ 願你年年都有機會出國，</span>
    <span class="line">踩過不同時區的土地，在異國街頭遇見美好的食物與風景。</span>
    <span class="line">未來的路很長，一切都只是剛剛開始 🌏</span>
  </p>
</div>

<p class="hint">✨ 點一下蛋糕，再次放煙火 ✨</p>

<script>
  /* ── 氣球 ── */
  (function createBalloons() {
    const container = document.getElementById('balloons');
    const colors = ['#ffb3c6','#ffc8dd','#ffafcc','#f8c8dc','#fdd5e3','#ffd1dc'];
    for (let i = 0; i < 14; i++) {
      const b = document.createElement('div');
      b.className = 'balloon';
      b.style.left = Math.random() * 100 + '%';
      b.style.background = colors[Math.floor(Math.random() * colors.length)];
      const dur = 12 + Math.random() * 10;
      const delay = -Math.random() * dur;
      b.style.animationDuration = dur + 's';
      b.style.animationDelay = delay + 's';
      b.style.transform = `scale(${0.7 + Math.random() * 0.7})`;
      container.appendChild(b);
    }
  })();

  /* ── 煙火引擎 ── */
  const canvas = document.getElementById('fireworks');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const FW_COLORS = [
    '#ff477e','#ff85a1','#ffb3c6','#ffd6e0',
    '#ffffff','#ffc8dd','#ff6b9d','#ffa5ab',
    '#ffd700','#ffecb3'
  ];

  function createFirework(x, y) {
    for (let i = 0; i < 70; i++) {
      const angle = (Math.PI * 2 * i) / 70 + Math.random() * 0.3;
      const speed = 2 + Math.random() * 5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color: FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)],
        size: 2 + Math.random() * 2.5,
        gravity: 0.05
      });
    }
  }

  function launchBurst(cx, baseY) {
    const spots = [
      { x: cx,       y: baseY - 100, d: 0   },
      { x: cx - 130, y: baseY - 60,  d: 200 },
      { x: cx + 130, y: baseY - 60,  d: 400 },
      { x: cx - 70,  y: baseY - 180, d: 600 },
      { x: cx + 70,  y: baseY - 180, d: 800 },
      { x: cx,       y: baseY - 260, d: 1000 },
    ];
    spots.forEach(s => setTimeout(() => createFirework(s.x, s.y), s.d));
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.vy += p.gravity;
      p.x  += p.vx;
      p.y  += p.vy;
      p.alpha -= 0.012;
      if (p.alpha <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle   = p.color;
      ctx.shadowBlur  = 10;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur  = 0;
    requestAnimationFrame(animate);
  }
  animate();

  /* ── 點蛋糕 → 煙火 ── */
  const cakeWrap = document.getElementById('cakeWrap');
  function fireworkFromCake() {
    const rect = cakeWrap.getBoundingClientRect();
    launchBurst(rect.left + rect.width / 2, rect.top);
  }
  cakeWrap.addEventListener('click', fireworkFromCake);

  /* ── 頁面載入後自動施放煙火（從畫面四角＋中央） ── */
  window.addEventListener('load', function() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const autoSpots = [
      { x: W * 0.2,  y: H * 0.3, d: 800  },
      { x: W * 0.8,  y: H * 0.3, d: 1200 },
      { x: W * 0.5,  y: H * 0.15,d: 1600 },
      { x: W * 0.15, y: H * 0.5, d: 2100 },
      { x: W * 0.85, y: H * 0.5, d: 2500 },
      { x: W * 0.5,  y: H * 0.2, d: 3000 },
    ];
    autoSpots.forEach(s => setTimeout(() => createFirework(s.x, s.y), s.d));
    /* 蛋糕那邊也補一波 */
    setTimeout(fireworkFromCake, 3600);
  });
</script>

</body>
</html>
